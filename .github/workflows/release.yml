name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  docker-release:
    runs-on: ubuntu-22.04
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version from VERSION file
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

      - name: Verify tag matches VERSION file
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match VERSION file ($FILE_VERSION)"
            exit 1
          fi

      - name: Build Docker image
        run: |
          docker build -t ai-cpp-course:${{ steps.version.outputs.version }} .
          docker tag ai-cpp-course:${{ steps.version.outputs.version }} ai-cpp-course:latest
