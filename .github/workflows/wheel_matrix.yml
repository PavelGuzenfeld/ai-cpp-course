name: Build Wheels

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  manylinux-wheels:
    name: "manylinux x86_64 (${{ matrix.python-version }})"
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["cp310", "cp311", "cp312"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: pip install cibuildwheel==2.22.0

      - name: Build wheels
        env:
          CIBW_BUILD: "${{ matrix.python-version }}-manylinux_x86_64"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y cmake gcc-toolset-13-gcc-c++ fmt-devel &&
            source /opt/rh/gcc-toolset-13/enable &&
            pip install nanobind
          CIBW_BEFORE_BUILD: "pip install nanobind numpy scikit-build-core"
          CIBW_ENVIRONMENT: >
            CMAKE_ARGS="-DCMAKE_CXX_STANDARD=23"
          CIBW_BUILD_VERBOSITY: 1
        run: |
          cd ai-cpp-l9
          cibuildwheel --output-dir ../wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-manylinux-${{ matrix.python-version }}
          path: wheelhouse/*.whl
          retention-days: 14

  collect:
    name: "Collect wheels"
    needs: [manylinux-wheels]
    runs-on: ubuntu-22.04
    if: always()

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-wheels
          pattern: wheels-*
          merge-multiple: true

      - name: List wheels
        run: ls -lh all-wheels/ 2>/dev/null || echo "No wheels built"

      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        if: hashFiles('all-wheels/*.whl') != ''
        with:
          name: all-wheels
          path: all-wheels/*.whl
          retention-days: 30
